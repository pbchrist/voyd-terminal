<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Voyd — The Gate of Nyandor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --deep-indigo: #1a1832;
    --midnight-blue: #0d1b2a;
    --gold: #c4a35a;
    --gold-light: #e0c675;
    --gold-dark: #a07b25;
    --cream: #f0e6d2;
    --parchment: #f5f0e1;
    --text-primary: #e8e0d0;
    --text-secondary: #b8a990;
    --violet: #5a4a8c;
    --violet-light: #7d6cb5;
    --shadow: rgba(0, 0, 0, 0.3);
  }
  
  body {
    background: var(--midnight-blue);
    color: var(--text-primary);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  /* Ambient particle effect */
  .particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  
  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0.4;
    animation: float-particle 8s infinite linear;
  }
  
  @keyframes float-particle {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.4; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
  }
  
  /* Header */
  .header {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
    z-index: 2;
    background: linear-gradient(to bottom, rgba(26, 24, 50, 0.8), transparent);
  }
  
  .title {
    font-family: 'Playfair Display', serif;
    font-size: 3.5em;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(196, 163, 90, 0.3);
    margin-bottom: 10px;
    letter-spacing: 0.1em;
    animation: title-glow 4s ease-in-out infinite alternate;
  }
  
  @keyframes title-glow {
    from { text-shadow: 0 0 30px rgba(196, 163, 90, 0.3); }
    to { text-shadow: 0 0 40px rgba(196, 163, 90, 0.5), 0 0 60px rgba(196, 163, 90, 0.2); }
  }
  
  .subtitle {
    font-size: 1.4em;
    color: var(--text-secondary);
    font-style: italic;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  
  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 20px auto;
  }
  
  /* Login Section */
  .login-section {
    max-width: 600px;
    margin: 40px auto;
    padding: 40px;
    background: rgba(26, 24, 50, 0.6);
    border: 1px solid rgba(196, 163, 90, 0.3);
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    position: relative;
    z-index: 2;
    backdrop-filter: blur(10px);
  }
  
  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 2em;
    color: var(--gold-light);
    text-align: center;
    margin-bottom: 10px;
  }
  
  .login-subtitle {
    text-align: center;
    color: var(--text-secondary);
    font-style: italic;
    margin-bottom: 30px;
  }
  
  .input-group {
    margin-bottom: 25px;
  }
  
  .input-label {
    display: block;
    color: var(--gold);
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  
  .input-field {
    width: 100%;
    padding: 12px 15px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--gold-dark);
    border-radius: 4px;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1em;
    outline: none;
    transition: all 0.3s ease;
  }
  
  .input-field:focus {
    border-color: var(--gold-light);
    box-shadow: 0 0 15px rgba(196, 163, 90, 0.2);
    background: rgba(0, 0, 0, 0.5);
  }
  
  .input-field::placeholder {
    color: var(--text-secondary);
    opacity: 0.6;
  }
  
  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(to right, var(--gold-dark), var(--gold), var(--gold-dark));
    color: var(--deep-indigo);
    border: none;
    border-radius: 4px;
    font-family: 'Playfair Display', serif;
    font-size: 1.2em;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(196, 163, 90, 0.3);
  }
  
  .btn-login:hover {
    background: linear-gradient(to right, var(--gold), var(--gold-light), var(--gold));
    box-shadow: 0 6px 20px rgba(196, 163, 90, 0.4);
    transform: translateY(-2px);
  }
  
  .btn-login:active {
    transform: translateY(0);
  }
  
  /* Terminal Interface */
  .terminal-section {
    display: none;
    max-width: 900px;
    margin: 40px auto;
    padding: 30px;
    background: rgba(13, 27, 42, 0.85);
    border: 1px solid rgba(196, 163, 90, 0.2);
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    position: relative;
    z-index: 2;
    backdrop-filter: blur(10px);
  }
  
  .terminal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 20px;
    margin-bottom: 20px;
    border-bottom: 1px solid rgba(196, 163, 90, 0.1);
  }
  
  .terminal-title {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 1.3em;
    letter-spacing: 0.1em;
  }
  
  .status-info {
    display: flex;
    gap: 20px;
    font-size: 0.9em;
    color: var(--text-secondary);
  }
  
  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  
  .dot-light { background: var(--gold-light); }
  .dot-gravity { background: var(--violet-light); }
  
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  
  .output-area {
    min-height: 300px;
    margin-bottom: 20px;
    padding: 20px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 6px;
    border-left: 3px solid var(--gold-dark);
  }
  
  .output-line {
    margin-bottom: 10px;
    line-height: 1.5;
    opacity: 0;
    animation: fade-in 0.5s forwards;
  }
  
  @keyframes fade-in {
    to { opacity: 1; }
  }
  
  .line-system {
    color: var(--gold-light);
    font-style: italic;
  }
  
  .line-message {
    color: var(--cream);
  }
  
  .line-error {
    color: #c45a5a;
  }
  
  .line-success {
    color: #7ec45a;
  }
  
  .line-cipher {
    color: var(--violet-light);
    font-family: monospace;
    font-size: 0.95em;
    background: rgba(125, 108, 181, 0.1);
    padding: 10px;
    border-radius: 4px;
    margin: 10px 0;
    overflow-x: auto;
  }
  
  .input-area {
    display: flex;
    align-items: center;
    gap: 15px;
    padding-top: 15px;
    border-top: 1px solid rgba(196, 163, 90, 0.1);
  }
  
  .prompt {
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-size: 1.1em;
    flex-shrink: 0;
  }
  
  .input-box {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--gold-dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1em;
    padding: 8px 0;
    outline: none;
    transition: all 0.3s ease;
  }
  
  .input-box:focus {
    border-bottom-color: var(--gold-light);
  }
  
  .input-box::placeholder {
    color: var(--text-secondary);
    opacity: 0.5;
  }
  
  /* Footer */
  .footer {
    text-align: center;
    padding: 40px 20px;
    margin-top: 60px;
    color: var(--text-secondary);
    font-style: italic;
    position: relative;
    z-index: 2;
  }
  
  .footer-quote {
    font-size: 1.2em;
    max-width: 600px;
    margin: 0 auto 20px;
  }
  
  .footer-attribution {
    font-size: 0.9em;
    opacity: 0.7;
  }
  
  /* Decorative Elements */
  .ornament {
    text-align: center;
    color: var(--gold);
    font-size: 1.5em;
    margin: 20px 0;
    opacity: 0.6;
  }
  
  .scroll-reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s ease;
  }
  
  .scroll-reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  
  /* Mobile Responsiveness */
  @media (max-width: 768px) {
    .title {
      font-size: 2.5em;
    }
    
    .login-section, .terminal-section {
      margin: 20px;
      padding: 25px;
    }
    
    .terminal-header {
      flex-direction: column;
      gap: 15px;
    }
    
    .status-info {
      flex-wrap: wrap;
      justify-content: center;
    }
  }
  
  /* Scrollbar Styling */
  ::-webkit-scrollbar {
    width: 8px;
  }
  
  ::-webkit-scrollbar-track {
    background: var(--midnight-blue);
  }
  
  ::-webkit-scrollbar-thumb {
    background: var(--gold-dark);
    border-radius: 4px;
  }
  
  ::-webkit-scrollbar-thumb:hover {
    background: var(--gold);
  }
</style>
</head>
<body>

<!-- Ambient Particles -->
<div class="particles" id="particles"></div>

<!-- Header -->
<header class="header">
  <h1 class="title">The Voyd</h1>
  <div class="subtitle">The Gate of Nyandor</div>
  <div class="divider"></div>
</header>

<!-- Login Section -->
<section class="login-section" id="loginSection">
  <div class="login-title">Enter the Mewniverse</div>
  <div class="login-subtitle">Provide your Construct ID to access the Voyd</div>
  
  <div class="ornament">❦</div>
  
  <div class="input-group">
    <label class="input-label">Construct ID</label>
    <input type="text" id="constructId" class="input-field" placeholder="Your name or email">
  </div>
  
  <button id="loginBtn" class="btn-login">Connect to the Voyd</button>
  
  <div class="ornament">❦</div>
</section>

<!-- Terminal Section -->
<section class="terminal-section" id="terminalSection">
  <div class="terminal-header">
    <div class="terminal-title">Voyd Interface</div>
    <div class="status-info">
      <div class="status-item">
        <div class="status-dot dot-light"></div>
        <span id="lightValue">Light: 0</span>
      </div>
      <div class="status-item">
        <div class="status-dot dot-gravity"></div>
        <span id="gravityValue">Gravity: 0</span>
      </div>
      <div class="status-item">
        <span id="sessionTime">Session: 00:00:00</span>
      </div>
    </div>
  </div>
  
  <div class="output-area" id="outputArea"></div>
  
  <div class="input-area">
    <span class="prompt">❯</span>
    <input type="text" id="commandInput" class="input-box" placeholder="Enter command (HELP for options)...">
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <div class="footer-quote">
    "Tales aren't just stories well-told, they're how we communicate, how we transact, how we transmit wisdom."
  </div>
  <div class="footer-attribution">— The Creator of All Tales</div>
</footer>

<script>
// Create ambient particles
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 8 + 's';
    particle.style.animationDuration = (8 + Math.random() * 4) + 's';
    container.appendChild(particle);
  }
}

// Boot sequence messages
const BOOT_MESSAGES = [
  { text: "Initializing the Voyd Neural Interface...", type: "system" },
  { text: "Connecting to the Mewniverse temporal matrix...", type: "system" },
  { text: "Bypassing reality firewalls...", type: "system" },
  { text: "Decrypting ancient knowledge streams...", type: "system" },
  { text: "Calibrating light and gravity sensors...", type: "system" },
  { text: "Loading construct profile...", type: "system" },
  { text: "WARNING: Temporal variance detected in Sector 2321", type: "error" },
  { text: "Establishing secure channel...", type: "system" },
  { text: "Connection established.", type: "success" },
  { text: "The Voyd acknowledges your presence.", type: "message" },
  { text: "", type: "message" },
  { text: "Type HELP for available commands.", type: "system" },
  { text: "", type: "message" },
  { text: "Remember: Your choices warp the timeline.", type: "message" }
];

// Command handlers
const COMMANDS = {
  help: () => [
    { text: "AVAILABLE COMMANDS:", type: "message" },
    { text: "─────────────────────", type: "message" },
    { text: "HELP              Show this message", type: "message" },
    { text: "STATUS            Check Voyd system status", type: "message" },
    { text: "SUBMIT [answer]   Submit cipher answer or puzzle solution", type: "message" },
    { text: "SCAN              Scan for temporal anomalies", type: "message" },
    { text: "SNIFF [sector]    [TIER-GATED] Deep scan hidden timeline data", type: "message" },
    { text: "LIGHT             View collective light meter", type: "message" },
    { text: "GRAVITY           View collective gravity meter", type: "message" },
    { text: "LOGOUT            Disconnect from Voyd", type: "message" },
    { text: "CLEAR             Clear terminal screen", type: "message" },
    { text: "", type: "message" },
    { text: "TIP: Your Construct ID is tied to your timeline choices.", type: "system" },
    { text: "Each choice warps reality. Choose wisely.", type: "system" }
  ],
  
  status: () => [
    { text: "Querying Voyd systems...", type: "system" },
    { text: "", type: "message" },
    { text: "VOYD SYSTEM STATUS", type: "message" },
    { text: "─────────────────────", type: "message" },
    { text: `Construct: ${localStorage.getItem('voyd_construct_id') || 'Unknown'}`, type: "message" },
    { text: `Session: ${document.getElementById('sessionTime').textContent.replace('Session: ', '')}`, type: "message" },
    { text: `Temporal Variance: ${(Math.random() * 100).toFixed(2)}%`, type: "message" },
    { text: `Anomalies Detected: ${Math.floor(Math.random() * 10) + 1}`, type: "message" },
    { text: `Light/Gravity Ratio: ${(parseInt(document.getElementById('lightValue').textContent) / (parseInt(document.getElementById('gravityValue').textContent) || 1)).toFixed(2)}`, type: "message" }
  ],
  
  scan: () => {
    const anomalies = [
      "SECTOR 2321.14 — Variance: 14.7% — Status: UNSTABLE",
      "SECTOR 7789.03 — Variance: 3.2% — Status: STABLE",
      "SECTOR 4512.88 — Variance: 67.1% — Status: CRITICAL",
      "SECTOR 9901.55 — Variance: 0.1% — Status: STABLE",
      "SECTOR 1134.22 — Variance: 42.8% — Status: UNSTABLE"
    ];
    
    const count = Math.floor(Math.random() * 3) + 2;
    const result = [
      { text: "Scanning temporal matrix for anomalies...", type: "system" },
      { text: "", type: "message" },
      { text: `${count} ANOMALIES DETECTED:`, type: "message" }
    ];
    
    for (let i = 0; i < count; i++) {
      result.push({ text: anomalies[Math.floor(Math.random() * anomalies.length)], type: "message" });
    }
    
    result.push({ text: "", type: "message" });
    result.push({ text: "Use SUBMIT to report anomalies.", type: "system" });
    
    return result;
  },
  
  sniff: () => {
    const tier = localStorage.getItem('voyd_tier') || 'free';
    
    if (tier === 'free') {
      return [
        { text: "ACCESS DENIED: SNIFF requires Ebonwood Stray tier or higher.", type: "error" },
        { text: "Upgrade via patreon.com/cw/TheGateofNyandor", type: "system" }
      ];
    }
    
    return [
      { text: "Deep scanning hidden timeline data...", type: "system" },
      { text: "", type: "message" },
      { text: "TIMELINE SNIP — CLASSIFIED", type: "message" },
      { text: "─────────────────────", type: "message" },
      { text: "[REDACTED] discovered Archivist cache at coordinates...", type: "message" },
      { text: "[REDACTED] P'taxx signal strength: INCREASING", type: "message" },
      { text: "[REDACTED] Second Furbidden Voyd location: CONFIRMED", type: "message" },
      { text: "[REDACTED] The clowder knows more than they reveal", type: "message" },
      { text: "", type: "message" },
      { text: "WARNING: This data is classified. Sharing may alter timeline.", type: "system" }
    ];
  },
  
  light: () => [
    { text: `COLLECTIVE LIGHT: ${document.getElementById('lightValue').textContent.replace('Light: ', '')}/1000`, type: "success" },
    { text: "Light represents choices that preserve knowledge and life.", type: "system" }
  ],
  
  gravity: () => [
    { text: `COLLECTIVE GRAVITY: ${document.getElementById('gravityValue').textContent.replace('Gravity: ', '')}/1000`, type: "error" },
    { text: "Gravity represents choices that uphold order and justice.", type: "system" }
  ],
  
  submit: (args) => {
    if (!args) {
      return [
        { text: "ERROR: No answer provided. Format: SUBMIT [your_answer]", type: "error" }
      ];
    }
    
    return [
      { text: "Transmitting answer to Voyd...", type: "system" },
      { text: "", type: "message" },
      { text: "Answer received and processed.", type: "success" },
      { text: "The Voyd evaluates your contribution to the timeline...", type: "system" }
    ];
  },
  
  logout: () => {
    localStorage.removeItem('voyd_construct_id');
    setTimeout(() => location.reload(), 1500);
    return [
      { text: "Disconnecting from Voyd...", type: "system" }
    ];
  },
  
  clear: () => {
    document.getElementById('outputArea').innerHTML = '';
    return [];
  }
};

// Utility functions
function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function addOutputLine(text, type = 'message') {
  const output = document.getElementById('outputArea');
  const line = document.createElement('div');
  line.className = `output-line line-${type}`;
  line.textContent = text;
  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
}

async function runBootSequence() {
  for (let i = 0; i < BOOT_MESSAGES.length; i++) {
    await delay(200 + Math.random() * 300);
    addOutputLine(BOOT_MESSAGES[i].text, BOOT_MESSAGES[i].type);
  }
  
  document.getElementById('commandInput').focus();
}

async function processCommand(input) {
  const parts = input.trim().split(/\s+/);
  const command = parts[0].toLowerCase();
  const args = parts.slice(1).join(' ');
  
  // Add user command to output
  addOutputLine(`❯ ${input}`, 'system');
  await delay(200);
  
  if (COMMANDS[command]) {
    const result = COMMANDS[command](args);
    for (const line of result) {
      await delay(100);
      addOutputLine(line.text, line.type);
    }
  } else {
    addOutputLine(`UNKNOWN COMMAND: ${command}. Type HELP for available commands.`, 'error');
  }
}

// Login handling
document.getElementById('loginBtn').addEventListener('click', () => {
  const constructId = document.getElementById('constructId').value.trim();
  if (!constructId) {
    alert('Please enter your Construct ID');
    return;
  }
  
  localStorage.setItem('voyd_construct_id', constructId);
  
  // Hide login, show terminal
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('terminalSection').style.display = 'block';
  
  // Start session timer
  let seconds = 0;
  setInterval(() => {
    seconds++;
    const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
    const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById('sessionTime').textContent = `Session: ${h}:${m}:${s}`;
  }, 1000);
  
  // Run boot sequence
  runBootSequence();
});

// Command input handling
document.getElementById('commandInput').addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const input = e.target.value;
    if (!input.trim()) return;
    
    e.target.value = '';
    await processCommand(input);
  }
});

// Initialize
createParticles();

// Auto-login if saved
if (localStorage.getItem('voyd_construct_id')) {
  document.getElementById('constructId').value = localStorage.getItem('voyd_construct_id');
}
</script>

</body>
</html>
